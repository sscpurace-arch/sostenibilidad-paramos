name: Keep Supabase Alive

on:
  schedule:
    # Se ejecuta a las 00:00 UTC los lunes y jueves (1 y 4)
    - cron: '0 0 * * 1,4'
  workflow_dispatch: # Permite ejecución manual para pruebas

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase table 'usuarios'
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/usuarios?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
